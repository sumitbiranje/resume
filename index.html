  .reveal{opacity:0;transform:translateY(24px);transition:opacity .7s ease,transform .7s ease}

  /* ---- responsive ---- */

    :root{--maxw:920px}
    .wrap{padding:0 26px}
    .about-grid{gap:34px}
  }
  @media(max-width:880px){
    .navlinks{position:fixed;top:62px;left:0;right:0;flex-direction:column;gap:0;
      background:rgba(12,12,28,.98);backdrop-filter:blur(14px);padding:8px 0;

    .navlinks.show{transform:translateY(0)}
    .navlinks a{padding:15px 26px;font-size:15px}
    .navlinks .cv-btn{margin:10px 26px;justify-content:center}
    .menu-toggle{display:flex}
    .about-grid{grid-template-columns:1fr;gap:28px}
    .explore-grid{grid-template-columns:1fr}
    .feature{grid-template-columns:1fr;gap:18px}
    .demo-btn{justify-self:start}

  }
  @media(max-width:680px){
    .wrap{padding:0 18px}
    .grid2{grid-template-columns:1fr}
    section{padding:58px 0}
    .feature{padding:24px 20px}
    .contact-card{padding:34px 20px}
    h1.name{font-size:clamp(38px,13vw,56px)}
    .lead{font-size:16px}
    .cta-row{width:100%}
    .btn-primary,.btn-ghost{flex:1 1 auto;justify-content:center;text-align:center}
    .clink{flex:1 1 auto;justify-content:center}
  }
  @media(prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
    html{scroll-behavior:auto}
    .reveal{opacity:1;transform:none}
  }
</style>

/* ====================== KNOWLEDGE GRAPH ====================== */
function GraphCanvas(){
  const ref = useRef(null);
  useEffect(()=>{
    const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const cv = ref.current; const ctx = cv.getContext("2d");
    let raf, W, H, dpr, small=false;
    const palette = ["#8B6CF6","#2DD4BF","#FB7185","#FBBF24"];
    const labels = ["Agents","LLM Orchestration","Knowledge Graphs","RAG","Prompt Eng","MCP Tools","FastAPI","Memory","Vector Search","Python"];
    const labelsShort = ["Agents","LLMs","Graphs","RAG","Prompts","MCP","FastAPI","Memory","Vectors","Python"];
    const edges = [[0,1],[0,5],[0,7],[1,3],[1,4],[2,3],[2,8],[3,8],[5,6],[6,9],[9,1],[7,0],[4,1],[8,2],[6,0]];
    let nodes = [], mouse={x:-9999,y:-9999}, t=0;
    function resize(){
      dpr = Math.min(window.devicePixelRatio||1, 2);
      W = cv.clientWidth; H = cv.clientHeight || window.innerHeight;
      cv.width = Math.max(1,W*dpr); cv.height = Math.max(1,H*dpr); ctx.setTransform(dpr,0,0,dpr,0,0);
    }
    function seed(){
      small = W<640;
      const L = small?labelsShort:labels;
      nodes = L.map((lab,i)=>({ lab, c:palette[i%palette.length],
        x:Math.random()*W, y:Math.random()*H,
        vx:(Math.random()-.5)*0.12, vy:(Math.random()-.5)*0.12,
        r:4+Math.random()*3, seed:Math.random()*1000 }));
    }
    function draw(){
      t += 0.005; ctx.clearRect(0,0,W,H);
      for(const [a,b] of edges){
        const n1=nodes[a], n2=nodes[b]; if(!n1||!n2) continue;
        const dist=Math.hypot(n2.x-n1.x, n2.y-n1.y);
        const g=ctx.createLinearGradient(n1.x,n1.y,n2.x,n2.y);
        g.addColorStop(0,n1.c); g.addColorStop(1,n2.c);
        ctx.strokeStyle=g; ctx.globalAlpha=Math.max(0.05, 0.22 - dist/2600);
        ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(n1.x,n1.y); ctx.lineTo(n2.x,n2.y); ctx.stroke();
      }
      ctx.globalAlpha=1;
      for(const n of nodes){
        if(!reduce){
          n.x += n.vx + Math.sin(t+n.seed)*0.06; n.y += n.vy + Math.cos(t+n.seed)*0.06;
          if(n.x<20||n.x>W-20) n.vx*=-1; if(n.y<20||n.y>H-20) n.vy*=-1;
          n.x=Math.max(16,Math.min(W-16,n.x)); n.y=Math.max(16,Math.min(H-16,n.y));
        }
        const near=Math.hypot(mouse.x-n.x, mouse.y-n.y)<120; const r=n.r*(near?1.7:1);
        const glow=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,r*5);
        glow.addColorStop(0,n.c+"55"); glow.addColorStop(1,n.c+"00");
        ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(n.x,n.y,r*5,0,7); ctx.fill();
        ctx.fillStyle=n.c; ctx.beginPath(); ctx.arc(n.x,n.y,r,0,7); ctx.fill();
        ctx.globalAlpha=near?1:0.5; ctx.fillStyle=near?"#EDEDFB":"#9293BE";
        ctx.font=`${near?(small?11:12):(small?9.5:10.5)}px 'JetBrains Mono', monospace`;
        ctx.fillText(n.lab, n.x+r+7, n.y+3); ctx.globalAlpha=1;
      }
      raf=requestAnimationFrame(draw);
    }
    function onMove(e){ const r=cv.getBoundingClientRect(); mouse.x=e.clientX-r.left; mouse.y=e.clientY-r.top; }
    function onLeave(){ mouse.x=-9999; mouse.y=-9999; }
    function onResize(){ resize(); seed(); }
    resize(); seed(); draw();
    window.addEventListener("resize",onResize);
    cv.addEventListener("mousemove",onMove); cv.addEventListener("mouseleave",onLeave);
    return ()=>{ cancelAnimationFrame(raf); window.removeEventListener("resize",onResize);
      cv.removeEventListener("mousemove",onMove); cv.removeEventListener("mouseleave",onLeave); };
  },[]);
  return <canvas id="graph" ref={ref}></canvas>;
}

/* ====================== HELPERS ====================== */
function useReveal(){
  useEffect(()=>{
    const els=document.querySelectorAll(".reveal");
    const io=new IntersectionObserver((ents)=>{
      ents.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add("in"); io.unobserve(e.target);} });
    },{threshold:0.12});
    els.forEach(el=>io.observe(el)); return ()=>io.disconnect();
  },[]);
}
const DL=({size=15})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3v12M7 11l5 5 5-5M5 21h14"/></svg>;
const Arrow=()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M7 17L17 7M9 7h8v8"/></svg>;

/* ====================== NAV ====================== */
function Nav(){
  const [scrolled,setScrolled]=useState(false);
  const [open,setOpen]=useState(false);
  useEffect(()=>{ const f=()=>setScrolled(window.scrollY>20); window.addEventListener("scroll",f); return ()=>window.removeEventListener("scroll",f); },[]);
  return (
    <nav className={scrolled?"scrolled":""}>
      <div className="wrap navrow">
        <a className="brand" href="#top"><span className="dot"></span>Sumit Biranje</a>
        <div className={"navlinks"+(open?" show":"")}>
          {NAVLINKS.map(([t,h])=> <a key={h} href={h} onClick={()=>setOpen(false)}>{t}</a>)}
          <a className="cv-btn" href={RESUME_FILE} download onClick={()=>setOpen(false)}><DL size={13}/>Download CV</a>
        </div>
        <button className="menu-toggle" onClick={()=>setOpen(o=>!o)} aria-label="Menu">{open?"\u2715":"\u2630"}</button>
      </div>
    </nav>
  );
}
