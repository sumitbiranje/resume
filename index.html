<!DOCTYPE html>

<style>
  :root{
    --bg:#0A0A18; --bg2:#0E0E22; --panel:rgba(24,24,46,0.55); --panel-solid:#15152C;
    --line:rgba(140,140,200,0.14); --line-strong:rgba(140,140,200,0.26);
    --ink:#EDEDFB; --mut:#9293BE; --mut2:#6E6F96;
    --violet:#8B6CF6; --teal:#2DD4BF; --coral:#FB7185; --amber:#FBBF24;
    --grad:linear-gradient(120deg,#8B6CF6 0%,#2DD4BF 100%);
    --maxw:1080px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:var(--bg); color:var(--ink);
    font-family:'Manrope',system-ui,sans-serif; line-height:1.6;
    -webkit-font-smoothing:antialiased; overflow-x:hidden;
  }
  a{color:inherit;text-decoration:none}
  ::selection{background:rgba(139,108,246,0.35)}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}

  /* ---- nav ---- */
  nav{position:fixed;top:0;left:0;right:0;z-index:50;
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    background:rgba(10,10,24,0.62);border-bottom:1px solid transparent;transition:border-color .3s}
  nav.scrolled{border-bottom:1px solid var(--line)}
  .navrow{display:flex;align-items:center;justify-content:space-between;height:64px}
  .brand{font-family:'Space Grotesk';font-weight:700;font-size:17px;letter-spacing:-.01em;display:flex;align-items:center;gap:9px}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--grad);box-shadow:0 0 12px rgba(139,108,246,.8)}
  .navlinks{display:flex;align-items:center;gap:28px}
  .navlinks a{font-size:14px;color:var(--mut);font-weight:500;transition:color .2s}
  .navlinks a:hover{color:var(--ink)}
  .cv-btn{font-family:'JetBrains Mono';font-size:12.5px;font-weight:500;
    padding:9px 16px;border-radius:10px;background:var(--grad);color:#0A0A18;
    font-weight:600;display:inline-flex;align-items:center;gap:7px;
    transition:transform .18s, box-shadow .18s;box-shadow:0 6px 20px -8px rgba(139,108,246,.7)}
  .cv-btn:hover{transform:translateY(-2px);box-shadow:0 10px 26px -8px rgba(45,212,191,.6)}
  .menu-toggle{display:none;background:none;border:1px solid var(--line-strong);color:var(--ink);
    width:40px;height:38px;border-radius:9px;font-size:18px;cursor:pointer}

  /* ---- hero ---- */
  header.hero{position:relative;min-height:100svh;display:flex;align-items:center;overflow:hidden}
  #graph{position:absolute;inset:0;width:100%;height:100%;z-index:0}
  .hero-veil{position:absolute;inset:0;z-index:1;pointer-events:none;
    background:radial-gradient(120% 80% at 70% 30%,rgba(10,10,24,0) 0%,rgba(10,10,24,.55) 60%,rgba(10,10,24,.92) 100%)}
  .hero-inner{position:relative;z-index:2;padding-top:64px}
  .eyebrow{font-family:'JetBrains Mono';font-size:13px;color:var(--teal);letter-spacing:.04em;
    display:inline-flex;align-items:center;gap:8px;margin-bottom:22px}
  .eyebrow .pulse{width:7px;height:7px;border-radius:50%;background:var(--teal);
    box-shadow:0 0 0 0 rgba(45,212,191,.7);animation:pulse 2.4s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(45,212,191,.55)}70%{box-shadow:0 0 0 12px rgba(45,212,191,0)}100%{box-shadow:0 0 0 0 rgba(45,212,191,0)}}
  h1.name{font-family:'Space Grotesk';font-weight:700;letter-spacing:-.03em;
    font-size:clamp(44px,9vw,86px);line-height:.98;margin-bottom:18px}
  h1.name .g{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .lead{font-size:clamp(17px,2.2vw,21px);color:var(--mut);max-width:580px;margin-bottom:14px}
  .lead b{color:var(--ink);font-weight:600}
  .roleline{font-family:'JetBrains Mono';font-size:13.5px;color:var(--mut2);margin-bottom:32px;letter-spacing:.02em}
  .cta-row{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
  .btn-primary{font-family:'JetBrains Mono';font-weight:600;font-size:14px;padding:14px 22px;border-radius:12px;
    background:var(--grad);color:#0A0A18;display:inline-flex;align-items:center;gap:9px;
    transition:transform .18s,box-shadow .18s;box-shadow:0 10px 30px -10px rgba(139,108,246,.7)}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 16px 36px -10px rgba(45,212,191,.6)}
  .btn-ghost{font-family:'JetBrains Mono';font-weight:500;font-size:14px;padding:14px 22px;border-radius:12px;
    border:1px solid var(--line-strong);color:var(--ink);transition:background .2s,border-color .2s}
  .btn-ghost:hover{background:rgba(139,108,246,.1);border-color:var(--violet)}
  .scroll-hint{position:absolute;bottom:26px;left:50%;transform:translateX(-50%);z-index:2;
    font-family:'JetBrains Mono';font-size:11px;color:var(--mut2);letter-spacing:.18em;text-align:center}
  .scroll-hint .bar{width:1px;height:34px;margin:8px auto 0;background:linear-gradient(var(--mut2),transparent);animation:fall 2s infinite}

  .sec-label::before{content:"";width:26px;height:1px;background:var(--violet);display:inline-block}

  .sec-intro{color:var(--mut);max-width:620px;font-size:16.5px}

  .about-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:40px;align-items:start}
  .about-grid p{color:var(--mut);font-size:16.5px;margin-bottom:16px}
  .about-grid p b{color:var(--ink);font-weight:600}
  .stat-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:22px 24px;

  .stat-card .n{font-family:'Space Grotesk';font-weight:700;font-size:30px;
    background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .stat-card .l{font-size:13.5px;color:var(--mut);margin-top:2px}

  /* ---- skills ---- */
  .skills-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
  .skill-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:22px 22px 20px;

    background:rgba(139,108,246,.07);border:1px solid var(--line);
    padding:4px 9px;border-radius:7px;transition:color .2s,border-color .2s}
  .skill-card:hover .tag{color:var(--ink)}

  /* ---- projects ---- */
  .proj{background:var(--panel);border:1px solid var(--line);border-radius:18px;
    padding:28px 28px 24px;margin-bottom:20px;backdrop-filter:blur(8px);
    transition:border-color .25s}
  .proj:hover{border-color:var(--line-strong)}
  .proj-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
  .proj-idx{font-family:'JetBrains Mono';font-size:12px;color:var(--mut2)}
  .proj h3{font-family:'Space Grotesk';font-size:22px;font-weight:600;letter-spacing:-.01em;margin:4px 0 8px}
  .proj .one{color:var(--mut);font-size:15.5px;max-width:640px}
  .impact{font-family:'JetBrains Mono';font-size:12px;color:var(--teal);
    background:rgba(45,212,191,.08);border:1px solid rgba(45,212,191,.22);
    padding:6px 12px;border-radius:9px;white-space:nowrap;align-self:flex-start}
  .proj-body{max-height:0;overflow:hidden;transition:max-height .45s ease}
  .proj-body-inner{padding-top:20px}
  .proj ul{list-style:none;margin:6px 0 16px}
  .proj li{position:relative;padding-left:20px;color:var(--mut);font-size:15px;margin-bottom:9px}
  .proj li::before{content:"";position:absolute;left:0;top:9px;width:7px;height:7px;border-radius:2px;
    background:var(--grad)}
  .proj li b{color:var(--ink);font-weight:600}
  .stack{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
  .proj-toggle{margin-top:14px;font-family:'JetBrains Mono';font-size:12.5px;color:var(--violet);
    background:none;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:7px;padding:0}
  .proj-toggle .chev{transition:transform .3s}
  .proj-toggle.open .chev{transform:rotate(180deg)}

  /* ---- timeline ---- */
  .tl{position:relative;padding-left:30px}
  .tl::before{content:"";position:absolute;left:6px;top:6px;bottom:6px;width:1.5px;
    background:linear-gradient(var(--violet),var(--teal),transparent)}
  .tl-item{position:relative;margin-bottom:30px}
  .tl-item::before{content:"";position:absolute;left:-30px;top:5px;width:13px;height:13px;border-radius:50%;
    background:var(--bg);border:2px solid var(--violet);box-shadow:0 0 0 4px rgba(139,108,246,.12)}
  .tl-item .when{font-family:'JetBrains Mono';font-size:12px;color:var(--mut2);margin-bottom:3px}
  .tl-item h3{font-family:'Space Grotesk';font-size:18px;font-weight:600}
  .tl-item .org{color:var(--teal);font-size:14px;margin-bottom:8px}
  .tl-item p{color:var(--mut);font-size:14.5px}

  /* ---- exploring ---- */
  .explore-note{font-family:'JetBrains Mono';font-size:12.5px;color:var(--amber);
    background:rgba(251,191,36,.07);border:1px solid rgba(251,191,36,.22);
    padding:8px 14px;border-radius:10px;display:inline-block;margin-bottom:24px}
  .explore-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .explore-card{background:var(--panel);border:1px dashed var(--line-strong);border-radius:16px;padding:22px;backdrop-filter:blur(8px)}
  .explore-card h3{font-family:'Space Grotesk';font-size:16px;font-weight:600;margin-bottom:8px}
  .explore-card p{color:var(--mut);font-size:14px}

  /* ---- contact ---- */
  .contact-card{background:var(--panel);border:1px solid var(--line);border-radius:22px;
    padding:48px 40px;text-align:center;backdrop-filter:blur(8px)}
  .contact-card h2{margin-bottom:14px}
  .contact-card p{color:var(--mut);max-width:480px;margin:0 auto 28px;font-size:16.5px}
  .contact-links{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
  .clink{font-family:'JetBrains Mono';font-size:13.5px;padding:12px 20px;border-radius:11px;
    border:1px solid var(--line-strong);display:inline-flex;align-items:center;gap:9px;
    transition:background .2s,border-color .2s,transform .18s}
  .clink:hover{background:rgba(139,108,246,.1);border-color:var(--violet);transform:translateY(-2px)}

  footer{padding:34px 0 44px;border-top:1px solid var(--line);text-align:center}
  footer p{font-family:'JetBrains Mono';font-size:12px;color:var(--mut2)}

  /* reveal animation */
  .reveal{opacity:0;transform:translateY(24px);transition:opacity .7s ease,transform .7s ease}
  .reveal.in{opacity:1;transform:none}

  /* ---- responsive ---- */
  /* tablet landscape / small desktop */
  @media(max-width:1024px){
    :root{--maxw:900px}
    .wrap{padding:0 28px}
    .about-grid{gap:30px}
    .explore-grid{gap:14px}
  }
  /* tablet portrait — collapse nav, stack wide grids */
  @media(max-width:880px){
    .navlinks{position:fixed;top:64px;left:0;right:0;flex-direction:column;gap:0;
      background:rgba(12,12,28,.97);backdrop-filter:blur(14px);padding:8px 0;
      border-bottom:1px solid var(--line);transform:translateY(-140%);transition:transform .32s;align-items:stretch}
    .navlinks.show{transform:translateY(0)}
    .navlinks a{padding:14px 28px;font-size:15px}
    .navlinks .cv-btn{margin:10px 28px;justify-content:center}
    .menu-toggle{display:block}
    .about-grid{grid-template-columns:1fr;gap:26px}
    .explore-grid{grid-template-columns:1fr}
    section{padding:80px 0}
  }
  /* phones */
  @media(max-width:680px){
    .wrap{padding:0 18px}
    .skills-grid{grid-template-columns:1fr}
    section{padding:60px 0}
    .proj{padding:22px 20px}
    .contact-card{padding:36px 22px}
    .proj-top{flex-direction:column}
    .impact{align-self:flex-start}
    h1.name{font-size:clamp(40px,12vw,60px)}
    .cta-row{width:100%}
    .btn-primary,.btn-ghost{flex:1;justify-content:center}
  }
  @media(prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
    html{scroll-behavior:auto}
    .reveal{opacity:1;transform:none}
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ============================ DATA ============================ */
const NAVLINKS = [["About","#about"],["Skills","#skills"],["Work","#work"],["Experience","#experience"],["Contact","#contact"]];

const SKILLS = [
  { t:"LLM & Agents", c:"var(--violet)",
    tags:["LangChain","LangGraph","OpenAI Agents SDK","Google ADK","FastMCP","Langflow","GPT-4o","Claude 4","Gemini"] },
  { t:"Knowledge Graphs", c:"var(--teal)",
    tags:["Neo4j","FalkorDB","Cypher","Schema design","Multi-hop traversal","Query optimisation"] },
  { t:"RAG & Retrieval", c:"var(--teal)",
    tags:["ChromaDB","FAISS","Hybrid search","Re-ranking","Graph-enhanced retrieval","Chunking"] },
  { t:"Prompt Engineering", c:"var(--coral)",
    tags:["CoT","ReAct","Tree-of-thought","Dynamic few-shot","Prompt chaining","Structured JSON","A/B testing"] },
  { t:"Observability", c:"var(--coral)",
    tags:["Langfuse","Tracing","Per-call cost","Prompt versioning","Eval pipelines","Latency profiling"] },
  { t:"Backend", c:"var(--amber)",
    tags:["FastAPI","FastMCP","Streamlit","Flask","Async / sync","Protocol abstractions","Concurrency"] },
  { t:"Data & Parsing", c:"var(--amber)",
    tags:["SQLite","DuckDB","MySQL","Parquet","NDJSON","PyArrow","tree-sitter"] },
  { t:"DevOps & QA", c:"var(--violet)",
    tags:["Docker","Podman","GitHub Actions","GitLab CI","pytest","ruff","mypy","TDD","JIRA"] },
];

const PROJECTS = [
  {
    name:"Code Impact Analysis & Test Selection",
    one:"A platform that reads code changes across many repos, walks a knowledge graph to find which tests they actually touch, and recommends a targeted suite — cutting regression scoping from hours to minutes.",
    impact:"Adopted across teams",
    points:[
      ["Streaming architecture","multi-phase pipeline with resumable checkpoints and thread-safe concurrent workers, with automatic fault recovery on failed builds."],
      ["Swappable graph layer","a Protocol-based abstraction over Neo4j and FalkorDB via a factory pattern — changing backend is one config toggle, zero code edits."],
      ["Polyglot parsing","tree-sitter extracts symbols across Java, Kotlin, C++, C, XML, AIDL and HAL to populate the graph each build."],
      ["Traceability","bidirectional code-to-requirement mapping through pruned multi-hop traversal, surfaced in a Streamlit dashboard with one-click Excel export."],
    ],
    stack:["Python 3.11","Neo4j","FalkorDB","tree-sitter","FastAPI","DuckDB","PyArrow","Streamlit"],
  },
  {
    name:"LLM Test Case Quality Reviewer",
    one:"A reviewer that scores test cases for completeness, clarity, traceability and automation potential in parallel — replacing days of manual review with a single automated run.",
    impact:"Days → one run",
    points:[
      ["Parallel evaluation","batched LLM analysis with structured prompting, fully traced per call so every score is auditable."],
      ["Configurable by team","a YAML-driven rules engine lets each team define its own quality criteria — no code forks, faster onboarding."],
      ["Measured against humans","Langfuse evaluation pipelines reached strong agreement with senior-reviewer scores, with per-call cost and latency tracked end to end."],
    ],
    stack:["Python 3.11","LangChain","Claude / GPT APIs","Langfuse","Streamlit","YAML"],
  },
  {
    name:"Automation Feasibility Analyzer",
    one:"A scoring tool that tells managers which test cases are worth automating — turning a multi-day manual judgement call into a data-driven, ROI-ranked workflow.",
    impact:"ROI-driven planning",
    points:[
      ["Three-axis scoring","rates each case on design complexity, framework capability and environment constraints to prioritise automation spend."],
      ["Agent orchestration","Langflow visual chains run the multi-step evaluation and ROI estimation, compressing days of assessment into an automated pass."],
      ["Decision-ready output","dependency-aware test-pack sequencing gives a clear cost-vs-coverage view for sprint planning."],
    ],
    stack:["Python 3.11","LangChain","Langflow","Claude / GPT APIs","Langfuse"],
  },
];

const EXPERIENCE = [
  { when:"Apr 2025 — Present", role:"Sr. Engineer — AI Engineering", org:"KPIT Technologies, Pune",
    desc:"Building production AI platforms: knowledge-graph test selection, LLM quality review, and agentic feasibility analysis — adopted as primary tooling across engineering teams." },
  { when:"Jun 2023 — Mar 2025", role:"Infotainment System Test Engineer", org:"KPIT Technologies, Pune",
    desc:"Functional, regression and integration testing for AOSP-based IVI systems. Led root-cause analysis with CANoe diagnostics and drove a high pre-release defect closure rate." },
  { when:"Jan 2022 — May 2023", role:"Trainee Engineer", org:"KPIT Technologies, Pune",
    desc:"Ramped to independent test ownership fastest in the cohort; authored documentation templates adopted by later trainee batches." },
];

const EXPLORING = [
  { t:"Domain-specific fine-tuning", d:"LoRA / QLoRA experiments with Unsloth on automotive test-case corpora, benchmarked against GPT-4o for accuracy and cost." },
  { t:"Production model selection", d:"Evaluating open-source LLMs (Llama, Mistral, Qwen, Gemma) on accuracy, latency and per-token cost to inform model-routing." },
  { t:"MLOps foundations", d:"Experiment tracking, model versioning and reproducible configs, working toward automated retraining pipelines." },
];

const RESUME_FILE = "Sumit_Biranje_Resume.pdf"; // keep this file next to index.html

/* ====================== KNOWLEDGE GRAPH ====================== */
function GraphCanvas(){
  const ref = useRef(null);
  useEffect(()=>{
    const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const cv = ref.current; const ctx = cv.getContext("2d");
    let raf, W, H, dpr;
    const palette = ["#8B6CF6","#2DD4BF","#FB7185","#FBBF24"];
    const labels = ["LLM Orchestration","Agentic Systems","Knowledge Graphs","RAG","Prompt Eng","Observability","Python Backend","tree-sitter","Vector Search","Automotive QA"];
    const labelsShort = ["LLM","Agents","Graphs","RAG","Prompts","Tracing","Backend","Parser","Vectors","QA"];
    const edges = [[0,1],[0,3],[0,4],[1,2],[2,3],[2,7],[3,8],[4,5],[5,0],[6,0],[6,2],[7,6],[8,3],[9,6],[1,4]];
    let nodes = [], mouse={x:-9999,y:-9999}, t=0, small=false;

    function resize(){
      dpr = Math.min(window.devicePixelRatio||1, 2);
      W = cv.clientWidth; H = cv.clientHeight;
      cv.width = W*dpr; cv.height = H*dpr; ctx.setTransform(dpr,0,0,dpr,0,0);
    }
    function seed(){
      small = W<640;
      const L = small?labelsShort:labels;
      nodes = L.map((lab,i)=>({
        lab, c: palette[i%palette.length],
        x: Math.random()*W, y: Math.random()*H,
        vx:(Math.random()-.5)*0.12, vy:(Math.random()-.5)*0.12,
        r: 4 + Math.random()*3, seed: Math.random()*1000,
      }));
    }
    function draw(){
      t += 0.005;
      ctx.clearRect(0,0,W,H);
      // edges
      for(const [a,b] of edges){
        const n1=nodes[a], n2=nodes[b]; if(!n1||!n2) continue;
        const dx=n2.x-n1.x, dy=n2.y-n1.y, dist=Math.hypot(dx,dy);
        const g=ctx.createLinearGradient(n1.x,n1.y,n2.x,n2.y);
        g.addColorStop(0,n1.c); g.addColorStop(1,n2.c);
        ctx.strokeStyle=g; ctx.globalAlpha=Math.max(0.05, 0.22 - dist/2600);
        ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(n1.x,n1.y); ctx.lineTo(n2.x,n2.y); ctx.stroke();
      }
      ctx.globalAlpha=1;
      // nodes
      for(const n of nodes){
        if(!reduce){
          n.x += n.vx + Math.sin(t+n.seed)*0.06;
          n.y += n.vy + Math.cos(t+n.seed)*0.06;
          if(n.x<20||n.x>W-20) n.vx*=-1; if(n.y<20||n.y>H-20) n.vy*=-1;
          n.x=Math.max(16,Math.min(W-16,n.x)); n.y=Math.max(16,Math.min(H-16,n.y));
        }
        const md=Math.hypot(mouse.x-n.x, mouse.y-n.y);
        const near = md<120;
        const r = n.r*(near?1.7:1);
        // glow
        const glow=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,r*5);
        glow.addColorStop(0,n.c+"55"); glow.addColorStop(1,n.c+"00");
        ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(n.x,n.y,r*5,0,7); ctx.fill();
        // core
        ctx.fillStyle=n.c; ctx.beginPath(); ctx.arc(n.x,n.y,r,0,7); ctx.fill();
        // label
        ctx.globalAlpha=near?1:0.5;
        ctx.fillStyle=near?"#EDEDFB":"#9293BE";
        ctx.font=`${near?(small?11:12):(small?9.5:10.5)}px 'JetBrains Mono', monospace`;
        ctx.fillText(n.lab, n.x+r+7, n.y+3);
        ctx.globalAlpha=1;
      }
      raf=requestAnimationFrame(draw);
    }
    function onMove(e){ const rect=cv.getBoundingClientRect(); mouse.x=e.clientX-rect.left; mouse.y=e.clientY-rect.top; }
    function onLeave(){ mouse.x=-9999; mouse.y=-9999; }
    resize(); seed(); draw();
    window.addEventListener("resize",()=>{resize();seed();});
    cv.addEventListener("mousemove",onMove); cv.addEventListener("mouseleave",onLeave);
    return ()=>{ cancelAnimationFrame(raf); cv.removeEventListener("mousemove",onMove); cv.removeEventListener("mouseleave",onLeave); };
  },[]);
  return <canvas id="graph" ref={ref}></canvas>;
}

/* ====================== HELPERS ====================== */
function useReveal(){
  useEffect(()=>{
    const els=document.querySelectorAll(".reveal");
    const io=new IntersectionObserver((ents)=>{
      ents.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add("in"); io.unobserve(e.target);} });
    },{threshold:0.12});
    els.forEach(el=>io.observe(el));
    return ()=>io.disconnect();
  },[]);
}
const DL = ({size=15}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3v12M7 11l5 5 5-5M5 21h14"/></svg>;
const Chev = () => <svg className="chev" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9l6 6 6-6"/></svg>;
const Arrow = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M7 17L17 7M9 7h8v8"/></svg>;

/* ====================== NAV ====================== */
function Nav(){
  const [scrolled,setScrolled]=useState(false);
  const [open,setOpen]=useState(false);
  useEffect(()=>{ const f=()=>setScrolled(window.scrollY>20); window.addEventListener("scroll",f); return ()=>window.removeEventListener("scroll",f); },[]);
  return (
    <nav className={scrolled?"scrolled":""}>
      <div className="wrap navrow">
        <a className="brand" href="#top"><span className="dot"></span>Sumit Biranje</a>
        <div className={"navlinks"+(open?" show":"")}>
          {NAVLINKS.map(([t,h])=> <a key={h} href={h} onClick={()=>setOpen(false)}>{t}</a>)}
          <a className="cv-btn" href={RESUME_FILE} download onClick={()=>setOpen(false)}><DL size={13}/>Download CV</a>
        </div>
        <button className="menu-toggle" onClick={()=>setOpen(o=>!o)} aria-label="Menu">{open?"✕":"☰"}</button>
      </div>
    </nav>
  );
}

/* ====================== PROJECT ====================== */
function Project({p,i}){
  const [open,setOpen]=useState(i===0);
  const ref=useRef(null);
  const [mh,setMh]=useState("0px");
  useEffect(()=>{
    const calc=()=>setMh(open && ref.current ? ref.current.scrollHeight+"px" : "0px");
    calc();
    window.addEventListener("resize",calc);
    return ()=>window.removeEventListener("resize",calc);
  },[open]);
  return (
    <div className="proj reveal">
      <div className="proj-top">
        <div>
          <div className="proj-idx">0{i+1} / PROJECT</div>
          <h3>{p.name}</h3>
          <p className="one">{p.one}</p>
        </div>
        <span className="impact">{p.impact}</span>
      </div>
      <div className="proj-body" style={{maxHeight:mh}}>
        <div className="proj-body-inner" ref={ref}>
          <ul>{p.points.map(([h,d],k)=><li key={k}><b>{h}</b> — {d}</li>)}</ul>
          <div className="stack">{p.stack.map(s=><span key={s} className="tag">{s}</span>)}</div>
        </div>
      </div>
      <button className={"proj-toggle"+(open?" open":"")} onClick={()=>setOpen(o=>!o)}>
        {open?"Hide details":"How it works"} <Chev/>
      </button>
    </div>
  );
}
